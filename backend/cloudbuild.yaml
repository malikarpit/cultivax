# Cloud Build configuration for CultivaX Backend
# Builds the Docker image and deploys to Cloud Run.
#
# Trigger: Push to main branch or manual trigger.
# Substitutions:
#   _REGION:         GCP region for Cloud Run (default: asia-south1)
#   _SERVICE_NAME:   Cloud Run service name (default: cultivax-backend)
#   _DB_INSTANCE:    Cloud SQL instance connection name

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: cultivax-backend
  _DB_INSTANCE: ${PROJECT_ID}:${_REGION}:cultivax-db

steps:
  # Step 1 — Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    dir: 'backend'

  # Step 2 — Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'
    dir: 'backend'

  # Step 3 — Run Alembic migrations via Cloud SQL Proxy
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker run --rm \
          --network cloudbuild \
          gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA} \
          alembic upgrade head
    env:
      - 'DATABASE_URL=postgresql://cultivax_user:$$DB_PASS@/cultivax_db?host=/cloudsql/${_DB_INSTANCE}'
    secretEnv: ['DB_PASS']

  # Step 4 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=4'
      - '--port=8000'
      - '--set-env-vars=APP_ENV=production,DEBUG=false'
      - '--add-cloudsql-instances=${_DB_INSTANCE}'
      - '--service-account=cultivax-backend@${PROJECT_ID}.iam.gserviceaccount.com'

# Store built images in GCR
images:
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'

# Available secrets (configured in Secret Manager)
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/cultivax-db-password/versions/latest
      env: 'DB_PASS'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'

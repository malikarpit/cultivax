version: "3.8"

networks:
  cultivax-network:
    driver: bridge

volumes:
  postgres_data:
  media_uploads:
  frontend_node_modules:

services:
  db:
    image: postgres:15
    container_name: cultivax-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cultivax_user
      POSTGRES_PASSWORD: cultivax_pass
      POSTGRES_DB: cultivax_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cultivax_user -d cultivax_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cultivax-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cultivax-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cultivax_user:cultivax_pass@db:5432/cultivax_db
      SECRET_KEY: dev-secret-key-change-in-prod
      APP_ENV: development
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8000"
      MEDIA_UPLOAD_DIR: /app/uploads/media
      LOG_LEVEL: INFO
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # API keys — loaded from .env at project root (gitignored, never committed)
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-stub}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_uploads:/app/uploads/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - cultivax-network
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_demo_users &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cultivax-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - cultivax-network
    command: npm run dev
